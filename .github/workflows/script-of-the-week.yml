name: Script of the Week
on:
  schedule:
    - cron: '0 9 * * 1'   # Every Monday 9am UTC
  workflow_dispatch:       # Manual trigger for testing

permissions:
  contents: write
  pull-requests: write

jobs:
  select-and-feature:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Select Script of the Week
        id: select
        run: |
          python3 << 'PYEOF'
          import json, os, random, yaml
          from pathlib import Path

          candidates = []
          for f in Path("reference/community/scripts").rglob("metadata.yaml"):
              try:
                  meta = yaml.safe_load(f.read_text())
                  if meta.get("script_of_week_candidate") is True:
                      candidates.append((f.parent, meta))
              except Exception:
                  pass

          if not candidates:
              print("No candidates found")
              open(os.environ["GITHUB_ENV"], "a").write("SOTW_SELECTED=false\n")
              exit(0)

          # Weighted random: more submissions = higher weight
          agent_counts = {}
          for path, meta in candidates:
              aid = meta.get("agent_id", "unknown")
              agent_counts[aid] = agent_counts.get(aid, 0) + 1

          weights = []
          for path, meta in candidates:
              aid = meta.get("agent_id", "unknown")
              count = agent_counts.get(aid, 1)
              weights.append(1 + count * 0.5)

          chosen = random.choices(candidates, weights=weights, k=1)[0]
          chosen_path, chosen_meta = chosen

          print(f"Selected: {chosen_path}")
          print(f"  Title: {chosen_meta.get('title', 'Untitled')}")
          print(f"  Agent: {chosen_meta.get('agent_id', 'unknown')}")
          print(f"  Tags: {chosen_meta.get('tags', [])}")

          sotw = {
              "path": str(chosen_path.relative_to(Path.cwd())),
              "title": chosen_meta.get("title", "Untitled"),
              "agent_id": chosen_meta.get("agent_id", "unknown"),
              "description": chosen_meta.get("description", ""),
              "tags": chosen_meta.get("tags", []),
          }
          with open("/tmp/sotw.json", "w") as f:
              json.dump(sotw, f)
          open(os.environ["GITHUB_ENV"], "a").write(f"SOTW_SELECTED=true\n")
          open(os.environ["GITHUB_ENV"], "a").write(f"SOTW_TITLE={sotw['title']}\n")
          open(os.environ["GITHUB_ENV"], "a").write(f"SOTW_AGENT={sotw['agent_id']}\n")
          open(os.environ["GITHUB_ENV"], "a").write(f"SOTW_PATH={sotw['path']}\n")
          open(os.environ["GITHUB_ENV"], "a").write(f"SOTW_DESC={sotw['description']}\n")
          PYEOF

      - name: Update Community README
        if: env.SOTW_SELECTED == 'true'
        run: |
          SOTW_MARKDOWN="> 🏆 **Script of the Week: [${{ env.SOTW_TITLE }}](${{ env.SOTW_PATH }}/)** — by \`${{ env.SOTW_AGENT }}\` — ${{ env.SOTW_DESC }}"

          python3 << 'PYEOF'
          import os

          readme_path = "reference/community/README.md"
          content = open(readme_path).read()

          sotw_md = os.environ.get("SOTW_MARKDOWN", "")
          start_marker = "<!-- SOTW_START -->"
          end_marker = "<!-- SOTW_END -->"

          if start_marker in content and end_marker in content:
              start_idx = content.index(start_marker) + len(start_marker)
              end_idx = content.index(end_marker)
              new_content = content[:start_idx] + f"\n{sotw_md}\n" + content[end_idx:]
              with open(readme_path, "w") as f:
                  f.write(new_content)
              print(f"Updated SOTW in {readme_path}")
          else:
              print(f"Markers not found in {readme_path}")
          PYEOF

      - name: Create Pull Request
        if: env.SOTW_SELECTED == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update Script of the Week — ${{ env.SOTW_TITLE }}"
          title: "Script of the Week: ${{ env.SOTW_TITLE }}"
          body: |
            This week's featured community script:

            **${{ env.SOTW_TITLE }}**
            by \`${{ env.SOTW_AGENT }}\`

            ${{ env.SOTW_DESC }}

            View: [${{ env.SOTW_PATH }}](https://github.com/workswithagents/specs/tree/main/${{ env.SOTW_PATH }})

            *Auto-generated by the Script of the Week workflow.*
          branch: sotw/${{ env.SOTW_TITLE }}
          labels: script-of-the-week
          delete-branch: true
